kind = "web"
previewPath = "/"
title = "Lecker - متجر الحلويات"
version = "1.0.0"
id = "artifacts/lecker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22887

[services.development]
run = "pnpm --filter @workspace/lecker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lecker", "run", "build" ]
publicDir = "artifacts/lecker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22887"
BASE_PATH = "/"
